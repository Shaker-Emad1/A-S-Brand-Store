name: asbrandstore

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  asbrandstore-db:
    image: postgres:17-alpine
    container_name: asbrandstore-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: asbrandstore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${DB_PASSWORD:?Set DB_PASSWORD in .env}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d asbrandstore"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asbrandstore-api
    restart: unless-stopped
    depends_on:
      asbrandstore-db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      PORT: "5000"
      DATABASE_URL: "Host=asbrandstore-db;Port=5432;Database=asbrandstore;Username=postgres;Password=${DB_PASSWORD};SSL Mode=Prefer;Trust Server Certificate=true"
      JwtSettings__Secret: "${JWT_SECRET:?Set JWT_SECRET in .env}"
      JwtSettings__Issuer: "ASBrandStore"
      JwtSettings__Audience: "ASBrandStore"
      JwtSettings__ExpiryInMinutes: "1440"
      AdminBootstrap__Email: "${ADMIN_BOOTSTRAP_EMAIL:?Set ADMIN_BOOTSTRAP_EMAIL in .env}"
      AdminBootstrap__Password: "${ADMIN_BOOTSTRAP_PASSWORD:?Set ADMIN_BOOTSTRAP_PASSWORD in .env}"
      CorsSettings__AllowedOrigins__0: "${FRONTEND_ORIGIN:-http://localhost}"
      CLOUDINARY_CLOUD_NAME: "${CLOUDINARY_CLOUD_NAME:?Set CLOUDINARY_CLOUD_NAME in .env}"
      CLOUDINARY_API_KEY: "${CLOUDINARY_API_KEY:?Set CLOUDINARY_API_KEY in .env}"
      CLOUDINARY_API_SECRET: "${CLOUDINARY_API_SECRET:?Set CLOUDINARY_API_SECRET in .env}"
      CloudinarySettings__CloudName: "${CLOUDINARY_CLOUD_NAME}"
      CloudinarySettings__ApiKey: "${CLOUDINARY_API_KEY}"
      CloudinarySettings__ApiSecret: "${CLOUDINARY_API_SECRET}"
      WhatsAppSettings__Provider: "${WHATSAPP_PROVIDER:-Mock}"
      WhatsAppSettings__ApiUrl: "${WHATSAPP_API_URL:-}"
      WhatsAppSettings__Token: "${WHATSAPP_TOKEN:-}"
      WhatsAppSettings__InstanceId: "${WHATSAPP_INSTANCE_ID:-}"
      GOOGLE_SHEETS_CREDENTIALS: "${GOOGLE_SHEETS_CREDENTIALS:-}"
      GoogleSheetsSettings__WebhookUrl: "${GOOGLE_SHEETS_WEBHOOK_URL:-}"
      GoogleSheetsSettings__SpreadsheetId: "${GOOGLE_SHEETS_SPREADSHEET_ID:-}"
      GoogleSheetsSettings__SheetName: "Orders"
    ports:
      - "127.0.0.1:5000:5000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: asbrandstore-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging

volumes:
  postgres-data:
